<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>W4 練習 Chatbot</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-icon">✦</span>
          <span class="logo-text">ChatBot</span>
        </div>
      </div>
      <button class="new-chat-btn" onclick="clearChat()">
        <span class="btn-icon">＋</span> 新對話
      </button>
      <div class="sidebar-footer">
        <button class="dark-toggle" id="dark-toggle" onclick="toggleDarkMode()">
          <span id="theme-icon">🌙</span>
          <span id="theme-text">深色模式</span>
        </button>
      </div>
    </aside>

    <!-- Main chat area -->
    <main class="chat-main">
      <header class="chat-header">
        <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
        <div class="header-info">
          <h1>🤖 練習用 Chatbot</h1>
          <p class="subtitle">W4 Git Branch 練習</p>
        </div>
        <div class="status-badge">
          <span class="status-dot"></span> 線上
        </div>
      </header>

      <div id="chat-box">
        <div class="welcome-screen" id="welcome-screen">
          <div class="welcome-icon">🤖</div>
          <h2>歡迎使用 ChatBot</h2>
          <p>嗨！我是練習用的 Chatbot，今天我們要學 Git Branch 🌿</p>
          <div class="suggestion-chips">
            <button class="chip" onclick="sendChip(this)">什麼是 Git Branch？</button>
            <button class="chip" onclick="sendChip(this)">如何建立分支？</button>
            <button class="chip" onclick="sendChip(this)">教我 merge</button>
          </div>
        </div>
      </div>

      <div class="input-area">
        <div class="input-wrapper">
          <input id="user-input" type="text" placeholder="輸入訊息..." autocomplete="off">
          <button id="send-btn" onclick="sendMessage()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
        <p class="input-hint">按 Enter 送出訊息</p>
      </div>
    </main>
  </div>

  <script>
    const chatBox = document.getElementById('chat-box');
    const welcomeScreen = document.getElementById('welcome-screen');
    const input = document.getElementById('user-input');
    let firstMessage = true;

    function sendChip(el) {
      input.value = el.textContent;
      sendMessage();
    }

    function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      // Hide welcome screen on first message
      if (firstMessage) {
        welcomeScreen.style.display = 'none';
        firstMessage = false;
      }

      // User message
      appendMessage(text, 'user');

      input.value = '';

      // Show typing indicator
      const typing = showTypingIndicator();

      // Simulate bot reply with delay
      setTimeout(() => {
        typing.remove();
        appendMessage(`你說了「${text}」，我收到了！`, 'bot');
      }, 800 + Math.random() * 600);
    }

    function appendMessage(text, sender) {
      const wrapper = document.createElement('div');
      wrapper.className = `message-row ${sender}`;

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = sender === 'bot' ? '🤖' : '👤';

      const bubble = document.createElement('div');
      bubble.className = `message ${sender}`;
      bubble.textContent = text;

      const time = document.createElement('span');
      time.className = 'msg-time';
      const now = new Date();
      time.textContent = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');

      if (sender === 'user') {
        wrapper.appendChild(bubble);
        wrapper.appendChild(avatar);
      } else {
        wrapper.appendChild(avatar);
        wrapper.appendChild(bubble);
      }
      bubble.appendChild(time);

      chatBox.appendChild(wrapper);

      // Animate entry
      requestAnimationFrame(() => {
        wrapper.classList.add('visible');
      });

      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function showTypingIndicator() {
      const wrapper = document.createElement('div');
      wrapper.className = 'message-row bot visible';
      wrapper.id = 'typing-indicator';

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = '🤖';

      const dots = document.createElement('div');
      dots.className = 'typing-dots';
      dots.innerHTML = '<span></span><span></span><span></span>';

      wrapper.appendChild(avatar);
      wrapper.appendChild(dots);
      chatBox.appendChild(wrapper);
      chatBox.scrollTop = chatBox.scrollHeight;

      return wrapper;
    }

    function clearChat() {
      chatBox.innerHTML = '';
      chatBox.appendChild(welcomeScreen);
      welcomeScreen.style.display = '';
      firstMessage = true;
    }

    function toggleDarkMode() {
      document.body.classList.toggle('dark');
      const icon = document.getElementById('theme-icon');
      const text = document.getElementById('theme-text');
      if (document.body.classList.contains('dark')) {
        icon.textContent = '☀️';
        text.textContent = '淺色模式';
      } else {
        icon.textContent = '🌙';
        text.textContent = '深色模式';
      }
    }

    function toggleSidebar() {
      document.querySelector('.app').classList.toggle('sidebar-collapsed');
    }

    // Enter to send
    input.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') sendMessage();
    });
  </script>

</body>
</html>
